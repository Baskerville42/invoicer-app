name: Bug report
description: Create a report to help us improve
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Дякуємо за повідомлення про помилку! Будь ласка, заповніть форму нижче.
  - type: textarea
    id: bug-description
    attributes:
      label: Опис помилки
      description: Чіткий та лаконічний опис того, що відбувається.
      placeholder: Опишіть проблему тут...
    validations:
      required: true
  - type: textarea
    id: reproduction-steps
    attributes:
      label: Кроки для відтворення
      description: Опишіть кроки, які призводять до виникнення помилки.
      placeholder: |
        1. Запустити додаток
        2. Натиснути на...
        3. Побачити помилку...
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Очікувана поведінка
      description: Чіткий опис того, що ви очікували побачити.
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Скріншоти
      description: Додайте скріншоти, якщо це можливо, щоб допомогти пояснити проблему.
  - type: input
    id: os-version
    attributes:
      label: Версія ОС
      placeholder: напр. macOS 14.4.1, Windows 11
  - type: textarea
    id: additional-context
    attributes:
      label: Додатковий контекст
      description: Додайте будь-яку іншу інформацію про проблему тут.
